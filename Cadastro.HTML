<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro — PrimeiroEmprego</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="form-page-wrap">
        <div class="form-visual">
            <div class="form-visual-bg" style="background-image: url('XXXX_imagem_cadastro.jpg');"></div>
            <div class="form-visual-overlay"></div>
            <div class="form-visual-content">
                <div class="big-number">1º</div>
                <blockquote>"A preparação para o primeiro emprego transforma não apenas a vida de um jovem, mas o futuro de toda a economia."</blockquote>
                <cite>— ODS 8 Metas Globais</cite>
            </div>
        </div>

        <div class="form-panel">
            <a href="login.html" class="logo-link" style="color: var(--carvao); margin-bottom: 2rem;">
                <span class="logo-dot"></span>
                <span style="color: var(--areia);">PRIMEIROEMPREGO</span>
            </a>

            <h1 class="form-title">CRIE SUA<br>CONTA</h1>
            <p class="form-subtitle">Já possui cadastro? <a href="login.html">Faça login aqui</a></p>

            <form action="index.html" method="GET">
                
                <div class="form-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" placeholder="Digite seu nome completo" required>
                </div>

                <div class="form-group">
                    <label for="email_cad">E-mail</label>
                    <input type="email" id="email_cad" placeholder="seu@email.com" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="telefone">Telefone</label>
                        <input type="tel" id="telefone" placeholder="(11) 90000-0000" required>
                    </div>
                    <div class="form-group">
                        <label for="nascimento">Data de Nascimento</label>
                        <input type="date" id="nascimento" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="senha_cad">Criar Senha</label>
                    <input type="password" id="senha_cad" placeholder="Mínimo de 8 caracteres" required>
                </div>

                <div class="form-check">
                    <input type="checkbox" id="termos" required>
                    <label for="termos">Eu concordo com os <a href="#">Termos de Uso</a> e <a href="#">Política de Privacidade</a>.</label>
                </div>

                <button type="submit" class="btn btn-primary btn-form">Criar conta e acessar →</button>
            </form>
        </div>
    </div>

</body>
</html>
