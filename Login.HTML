<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar — PrimeiroEmprego</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="form-page-wrap">
        <div class="form-panel">
            <a href="login.html" class="logo-link" style="color: var(--carvao); margin-bottom: 3rem;">
                <span class="logo-dot"></span>
                <span style="color: var(--areia);">PRIMEIROEMPREGO</span>
            </a>

            <h1 class="form-title">BEM-VINDO<br>DE VOLTA</h1>
            <p class="form-subtitle">Não tem uma conta? <a href="cadastro.html">Cadastre-se grátis</a></p>

            <form action="index.html" method="GET">
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>

                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="••••••••" required>
                </div>

                <div class="form-check">
                    <input type="checkbox" id="lembrar">
                    <label for="lembrar">Lembrar de mim por 30 dias</label>
                </div>

                <button type="submit" class="btn btn-primary btn-form">Entrar na plataforma →</button>
            </form>
        </div>

        <div class="form-visual">
            <div class="form-visual-bg" style="background-image: url('XXXX_imagem_login.jpg');"></div>
            <div class="form-visual-overlay"></div>
            <div class="form-visual-content">
                <div class="big-number">8</div>
                <blockquote>"O trabalho decente é a base para o desenvolvimento sustentável e a erradicação da pobreza global."</blockquote>
                <cite>— Organização das Nações Unidas</cite>
            </div>
        </div>
    </div>

</body>
</html>
