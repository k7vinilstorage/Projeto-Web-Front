<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title> 
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="background">
        <div class="left">
            <div class="logo-box">
                <span class="logo-dot"></span>
                <span class="logo-text">PRIMEIROEMPREGO</span>
            </div>

            <h1 class="Menu_titulo">BEM-VINDO DE VOLTA</h1>
            
            <div class="Menu">
                <div class="Cadastro">
                    <h2>Não tem uma conta? <a class="btn-cadastro" href="cadastro.html">Cadastre-se grátis</a></h2>
                </div>
                
                <form action="index.html" method="GET">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="Digite seu e-mail">

                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="••••••••">

                    <input type="checkbox" id="lembrar">
                    <label for="lembrar">Lembrar de mim por 30 dias</label>

                    <button type="submit">Entrar na plataforma</button>
                </form>
            </div>
        </div>

        <div class="right">
            <div class="numero-fundo">8</div>
            <div class="conteudo">
                <div class="ODS8">ODS - 8</div>
                <blockquote>"O trabalho decente é a base para o desenvolvimento sustentável e a erradicação da pobreza global."</blockquote>
                <cite>— Organização das Nações Unidas</cite>
            </div>
        </div>
    </div>

    <div class="rodape"></div>
</body>
</html>
